
services:
  db:
    image: mysql:8.0
    container_name: veterinariapp-mysql
    restart: always
    environment:
      MYSQL_DATABASE: veterinariapp_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306" # PC (3307) -> Contenedor (3306)
    volumes:
      - veti_data:/var/lib/mysql

volumes:
  veti_data: